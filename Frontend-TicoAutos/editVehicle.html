<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TicoAutos | Editar vehiculo</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="stylesheet" href="./css/vehicleForms.css" />
</head>
<body>
  <header class="site-header compact">
    <a class="brand" href="./index.html">TicoAutos</a>
    <nav id="navActions" class="nav-actions"></nav>
  </header>

  <main class="page-shell">
    <section class="vehicle-form-card">
      <div class="panel-head">
        <div>
          <span class="eyebrow">Edicion</span>
          <h1>Editar vehiculo</h1>
        </div>
        <a class="btn btn-secondary" href="./index.html">Volver</a>
      </div>

      <form id="editVehicleForm" class="vehicle-form" novalidate>
        <div class="vehicle-form-grid">
          <label>
            Marca
            <input type="text" id="brand" required minlength="2" maxlength="50" />
          </label>
          <label>
            Modelo
            <input type="text" id="model" required minlength="1" maxlength="50" />
          </label>
        </div>

        <div class="vehicle-form-grid">
          <label>
            Anio
            <input type="number" id="year" required min="1900" max="2100" />
          </label>
          <label>
            Precio
            <input type="number" id="price" required min="0" />
          </label>
        </div>

        <label>
          Color
          <input type="text" id="color" required minlength="2" maxlength="30" />
        </label>

        <label>
          Agregar imagenes
          <input type="file" id="images" accept="image/png,image/jpeg,image/webp" multiple />
        </label>

        <div id="currentImages" class="image-preview-grid"></div>
        <div id="imagePreview" class="image-preview-grid"></div>

        <button type="submit" class="btn btn-primary" id="updateVehicleBtn">Actualizar vehiculo</button>
        <p id="msg" class="feedback" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="./js/app.js"></script>
  <script src="./js/editVehicle.js"></script>
</body>
</html>
