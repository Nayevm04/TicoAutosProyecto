<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TicoAutos | Registro</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="site-header compact">
    <a class="brand" href="./index.html">TicoAutos</a>
    <nav id="navActions" class="nav-actions"></nav>
  </header>

  <main class="auth-shell">
    <section class="auth-card wide">
      <div>
        <span class="eyebrow">Cuenta nueva</span>
        <h1>Crea tu perfil</h1>
        <p class="auth-copy">Registra tu cuenta para publicar vehiculos y gestionar mensajes en un solo lugar.</p>
      </div>

      <form id="registerForm" class="stack-form" novalidate>
        <div class="split-fields">
          <label>
            Nombre
            <input type="text" id="name" required minlength="2" autocomplete="given-name" />
          </label>
          <label>
            Apellido
            <input type="text" id="lastname" required minlength="2" autocomplete="family-name" />
          </label>
        </div>

        <label>
          Correo
          <input type="email" id="email" required autocomplete="email" />
        </label>

        <label>
          Contrasena
          <input type="password" id="password" required minlength="6" autocomplete="new-password" />
        </label>

        <button type="submit" class="btn btn-primary" id="btnRegister">Crear cuenta</button>
        <p id="msg" class="feedback" aria-live="polite"></p>
      </form>

      <p class="auth-link">Ya tienes cuenta? <a href="./login.html">Inicia sesion</a></p>
    </section>
  </main>

  <script src="./js/app.js"></script>
  <script src="./js/register.js"></script>
</body>
</html>
